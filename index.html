<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Виртуальное кафе · Режим Хозяйки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-wrapper {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Экран входа */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1e3a2a, #0f2a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            border-radius: 40px;
            padding: 40px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .login-card h1 {
            font-size: 2.5rem;
            color: #2c5e2e;
            margin-bottom: 10px;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1rem;
            text-align: center;
        }

        .role-selector {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .role-btn.active {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            border-color: #e67e22;
            color: white;
        }

        .role-btn.hostess {
            background: #fef5e8;
        }

        .login-btn {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        /* Основной интерфейс */
        .main-interface {
            display: none;
        }

        .cafe-header {
            background: rgba(255,255,245,0.95);
            border-radius: 30px;
            padding: 20px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fef5e8;
            padding: 8px 20px;
            border-radius: 50px;
        }

        .user-name {
            font-weight: bold;
            color: #2c3e2f;
            font-size: 1.2rem;
        }

        .user-role {
            background: #e67e22;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .change-user-btn {
            background: #e67e22;
            border: none;
            padding: 6px 15px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .stats-badge {
            background: #2c5e2e;
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
        }

        /* Две колонки */
        .menu-order-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
        }

        .menu-panel {
            flex: 1.5;
            min-width: 280px;
            background: rgba(255,255,245,0.95);
            border-radius: 30px;
            padding: 20px;
        }

        .orders-panel {
            flex: 2;
            min-width: 350px;
            background: rgba(255,255,245,0.95);
            border-radius: 30px;
            padding: 20px;
            height: fit-content;
            max-height: 85vh;
            overflow-y: auto;
        }

        /* Категории */
        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eedbbc;
        }

        .cat-btn {
            background: #f5ede3;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .cat-btn.active {
            background: #e67e22;
            color: white;
        }

        /* Сетка блюд */
        .dishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .dish-card {
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.08);
        }

        .dish-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }

        .dish-emoji {
            font-size: 2.5rem;
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #fef5e8, #fff5e8);
        }

        .dish-info {
            padding: 12px;
        }

        .dish-name {
            font-weight: 800;
            font-size: 1rem;
        }

        .dish-price {
            font-weight: 800;
            font-size: 1.1rem;
            color: #e67e22;
            margin-top: 5px;
        }

        /* Корзина (только для посетителей) */
        .cart-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eedbbc;
        }

        .cart-header {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c5e2e;
        }

        .cart-items-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .cart-item {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #e67e22;
        }

        .cart-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .qty-btn {
            background: #f0e2d0;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }

        .cart-total {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: right;
            margin: 15px 0;
        }

        .btn-order {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn-clear {
            background: #ecf0f1;
            color: #7f8c8d;
            border: none;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        /* Стили для заказов (режим Хозяйки) */
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .orders-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c5e2e;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 6px 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: #f0e2d0;
            font-size: 0.85rem;
        }

        .filter-btn.active {
            background: #e67e22;
            color: white;
        }

        .order-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #e67e22;
            transition: all 0.2s;
        }

        .order-card.completed {
            border-left-color: #2ecc71;
            background: #f8fff8;
            opacity: 0.85;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .order-customer {
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c5e2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-customer-emoji {
            font-size: 1.2rem;
        }

        .order-date {
            font-size: 0.7rem;
            color: #8b7355;
        }

        .order-status {
            font-size: 0.7rem;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .status-pending {
            background: #fef3e2;
            color: #e67e22;
        }

        .status-completed {
            background: #d5f0e0;
            color: #2ecc71;
        }

        .order-items {
            font-size: 0.85rem;
            color: #5a4a38;
            margin: 10px 0;
            padding-left: 15px;
            border-left: 2px solid #f0e2d0;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .order-total {
            font-weight: bold;
            color: #e67e22;
            font-size: 1rem;
        }

        .complete-order-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .complete-order-btn:hover {
            background: #27ae60;
            transform: scale(1.02);
        }

        .empty-orders {
            text-align: center;
            padding: 50px;
            color: #b5916b;
        }

        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            animation: slideIn 0.3s ease;
            z-index: 1100;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .orders-panel {
                max-height: none;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- Экран входа -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="cafe-icon">🍽️</div>
            <h1>Виртуальное кафе АНГЕЛИНА</h1>
            <p style="color: #7f8c8d; margin-bottom: 15px;">Выберите режим и войдите</p>
            
            <div class="role-selector">
                <button class="role-btn" data-role="guest">🍕 Посетитель</button>
                <button class="role-btn hostess" data-role="hostess">👩‍🍳 Хозяйка кафе</button>
            </div>
            
            <input type="text" id="userNameInput" placeholder="Введите ваше имя" maxlength="30">
            <button class="login-btn" id="loginBtn">✨ Войти ✨</button>
            <div class="error-msg" id="loginError">Пожалуйста, введите имя</div>
            <div class="error-msg" id="roleError" style="display:none;">Выберите роль</div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div class="main-interface" id="mainInterface">
        <div class="cafe-header">
            <div class="user-info">
                <span>👤</span>
                <span class="user-name" id="displayUserName"></span>
                <span class="user-role" id="displayUserRole"></span>
                <button class="change-user-btn" id="changeUserBtn">Сменить режим</button>
            </div>
            <div class="stats-badge" id="statsBadge">📊 Статистика</div>
        </div>

        <div class="menu-order-layout">
            <!-- Меню (видно всем) -->
            <div class="menu-panel">
                <div class="category-bar" id="categoryBar"></div>
                <div class="dishes-grid" id="dishesGrid"></div>
                
                <!-- Корзина только для посетителей -->
                <div id="cartSection" class="cart-section" style="display: none;">
                    <div class="cart-header">🛒 Моя корзина</div>
                    <div id="cartContainer" class="cart-items-list"></div>
                    <div class="cart-total" id="cartTotal">Итого: 0 ₽</div>
                    <button class="btn-order" id="placeOrderBtn">✨ Оформить заказ ✨</button>
                    <button class="btn-clear" id="clearCartBtn">🗑️ Очистить</button>
                </div>
            </div>

            <!-- Панель заказов (для Хозяйки) -->
            <div class="orders-panel" id="ordersPanel" style="display: none;">
                <div class="orders-header">
                    <div class="orders-title">📋 Все заказы посетителей</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">Все</button>
                        <button class="filter-btn" data-filter="pending">⏳ Ожидают</button>
                        <button class="filter-btn" data-filter="completed">✅ Выполнены</button>
                    </div>
                </div>
                <div id="allOrdersList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ===================== МЕНЮ =====================
    const MENU = [
        { id: 1, name: "Цезарь с курицей", price: 390, category: "Салаты", emoji: "🥗", desc: "Курица, пармезан" },
        { id: 2, name: "Греческий салат", price: 320, category: "Салаты", emoji: "🥙", desc: "Фета, оливки" },
        { id: 3, name: "Том Ям", price: 450, category: "Супы", emoji: "🍲", desc: "Креветки, грибы" },
        { id: 4, name: "Борщ", price: 280, category: "Супы", emoji: "🥣", desc: "С пампушкой" },
        { id: 5, name: "Стейк Рибай", price: 890, category: "Горячее", emoji: "🥩", desc: "Мраморная говядина" },
        { id: 6, name: "Паста Карбонара", price: 470, category: "Горячее", emoji: "🍝", desc: "Бекон, сливочный соус" },
        { id: 7, name: "Картошка фри", price: 190, category: "Закуски", emoji: "🍟", desc: "Хрустящая" },
        { id: 8, name: "Куриные крылья", price: 390, category: "Закуски", emoji: "🍗", desc: "BBQ соус" },
        { id: 9, name: "Чизкейк", price: 290, category: "Десерты", emoji: "🍰", desc: "Нью-Йорк" },
        { id: 10, name: "Тирамису", price: 320, category: "Десерты", emoji: "🍮", desc: "Кофейный" },
        { id: 11, name: "Латте", price: 170, category: "Напитки", emoji: "☕", desc: "Сливочный" },
        { id: 12, name: "Лимонад", price: 210, category: "Напитки", emoji: "🍹", desc: "Мятный" }
    ];

    const CATEGORIES = ["Все", ...new Set(MENU.map(item => item.category))];

    // ===================== ГЛОБАЛЬНОЕ ХРАНИЛИЩЕ =====================
    let currentUser = null;
    let currentRole = null; // 'guest' или 'hostess'
    let currentFilter = 'all';
    
    const STORAGE_KEY = "virtualCafeAllData";

    // Структура хранения:
    // {
    //   users: {
    //     "Анна": { cart: [], ordersHistory: [] },
    //     "Максим": { cart: [], ordersHistory: [] }
    //   },
    //   allOrders: [ { id, customerName, date, items, total, status, orderId } ]
    // }

    function loadAllData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                return JSON.parse(stored);
            } catch(e) {
                return { users: {}, allOrders: [] };
            }
        }
        return { users: {}, allOrders: [] };
    }

    function saveAllData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // Сохранить пользователя
    function saveUser(userName, userData) {
        const data = loadAllData();
        data.users[userName] = userData;
        saveAllData(data);
    }

    // Загрузить пользователя
    function loadUser(userName) {
        const data = loadAllData();
        if (data.users[userName]) {
            return data.users[userName];
        }
        return { cart: [], ordersHistory: [] };
    }

    // Получить все заказы всех посетителей
    function getAllOrders() {
        const data = loadAllData();
        return data.allOrders || [];
    }

    // Сохранить все заказы
    function saveAllOrders(orders) {
        const data = loadAllData();
        data.allOrders = orders;
        saveAllData(data);
    }

    // Добавить новый заказ
    function addOrder(customerName, orderItems, total) {
        const orders = getAllOrders();
        const newOrder = {
            id: Date.now(),
            orderId: `#${Date.now().toString().slice(-6)}`,
            customerName: customerName,
            date: new Date().toLocaleString(),
            items: orderItems,
            total: total,
            status: "pending"
        };
        orders.unshift(newOrder);
        saveAllOrders(orders);
        
        // Также сохраняем в историю пользователя
        const userData = loadUser(customerName);
        userData.ordersHistory = userData.ordersHistory || [];
        userData.ordersHistory.unshift({
            id: newOrder.id,
            date: newOrder.date,
            items: orderItems,
            total: total,
            status: "pending"
        });
        saveUser(customerName, userData);
        
        return newOrder;
    }

    // Отметить заказ как выполненный (только для Хозяйки)
    function markOrderCompleted(orderId) {
        const orders = getAllOrders();
        const orderIndex = orders.findIndex(o => o.id === orderId);
        if (orderIndex !== -1 && orders[orderIndex].status === "pending") {
            orders[orderIndex].status = "completed";
            saveAllOrders(orders);
            
            // Обновляем историю пользователя
            const customerName = orders[orderIndex].customerName;
            const userData = loadUser(customerName);
            const userOrderIndex = userData.ordersHistory.findIndex(o => o.id === orderId);
            if (userOrderIndex !== -1) {
                userData.ordersHistory[userOrderIndex].status = "completed";
                saveUser(customerName, userData);
            }
            
            return true;
        }
        return false;
    }

    // ===================== ФУНКЦИИ ДЛЯ ПОСЕТИТЕЛЯ =====================
    let currentGuest = null;

    function initGuest(userName) {
        currentGuest = userName;
        const userData = loadUser(userName);
        currentUser = {
            name: userName,
            cart: userData.cart || [],
            ordersHistory: userData.ordersHistory || []
        };
    }

    function saveGuestData() {
        if (currentUser && currentRole === 'guest') {
            saveUser(currentUser.name, {
                cart: currentUser.cart,
                ordersHistory: currentUser.ordersHistory
            });
        }
    }

    function addToCart(dish) {
        if (currentRole !== 'guest') return;
        const existing = currentUser.cart.find(item => item.id === dish.id);
        if (existing) {
            existing.quantity++;
        } else {
            currentUser.cart.push({ ...dish, quantity: 1 });
        }
        saveGuestData();
        renderGuestCart();
        showNotification(`✅ ${dish.name} добавлен в корзину`);
    }

    function updateQuantity(id, delta) {
        const index = currentUser.cart.findIndex(item => item.id === id);
        if (index !== -1) {
            const newQty = currentUser.cart[index].quantity + delta;
            if (newQty <= 0) {
                currentUser.cart.splice(index, 1);
            } else {
                currentUser.cart[index].quantity = newQty;
            }
            saveGuestData();
            renderGuestCart();
        }
    }

    function clearGuestCart() {
        if (currentUser.cart.length === 0) {
            showNotification("Корзина уже пуста");
            return;
        }
        currentUser.cart = [];
        saveGuestData();
        renderGuestCart();
        showNotification("🗑️ Корзина очищена");
    }

    function placeGuestOrder() {
        if (currentUser.cart.length === 0) {
            showNotification("❌ Корзина пуста!", "error");
            return;
        }

        const total = currentUser.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const orderItems = currentUser.cart.map(item => ({
            name: item.name,
            quantity: item.quantity,
            price: item.price
        }));

        // Добавляем заказ в общую базу
        const newOrder = addOrder(currentUser.name, orderItems, total);
        
        // Очищаем корзину
        currentUser.cart = [];
        saveGuestData();
        
        renderGuestCart();
        showNotification(`🎉 Заказ ${newOrder.orderId} оформлен! Сумма: ${total} ₽. Хозяйка скоро подтвердит!`, "success");
        
        // Если Хозяйка онлайн, обновим её панель
        if (document.getElementById("ordersPanel").style.display === "block") {
            renderAllOrders();
        }
    }

    // ===================== ОТРИСОВКА =====================
    let currentCategory = "Все";

    function renderCategories() {
        const container = document.getElementById("categoryBar");
        if (!container) return;
        container.innerHTML = CATEGORIES.map(cat => `
            <button class="cat-btn ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">${cat}</button>
        `).join("");
        
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                currentCategory = btn.dataset.cat;
                renderCategories();
                renderMenu();
            });
        });
    }

    function renderMenu() {
        const container = document.getElementById("dishesGrid");
        let filtered = currentCategory === "Все" ? MENU : MENU.filter(d => d.category === currentCategory);
        
        container.innerHTML = filtered.map(dish => `
            <div class="dish-card" data-dish='${JSON.stringify(dish)}'>
                <div class="dish-emoji">${dish.emoji}</div>
                <div class="dish-info">
                    <div class="dish-name">${dish.name}</div>
                    <div class="dish-price">${dish.price} ₽</div>
                </div>
            </div>
        `).join("");
        
        document.querySelectorAll(".dish-card").forEach(card => {
            card.addEventListener("click", () => {
                const dish = JSON.parse(card.dataset.dish);
                if (currentRole === 'guest') {
                    addToCart(dish);
                } else {
                    showNotification("👩‍🍳 Хозяйка не может делать заказы, только управлять ими");
                }
            });
        });
    }

    function renderGuestCart() {
        const container = document.getElementById("cartContainer");
        const totalSpan = document.getElementById("cartTotal");
        
        if (!currentUser || currentUser.cart.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:20px; color:#b5916b;">Корзина пуста</div>`;
            totalSpan.innerText = "Итого: 0 ₽";
            return;
        }
        
        let total = 0;
        let html = "";
        currentUser.cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong>
                        <div style="font-size:0.75rem;">${item.price} ₽ × ${item.quantity}</div>
                    </div>
                    <div class="cart-controls">
                        <button class="qty-btn" data-id="${item.id}" data-delta="-1">−</button>
                        <span style="min-width:25px; text-align:center;">${item.quantity}</span>
                        <button class="qty-btn" data-id="${item.id}" data-delta="1">+</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerText = `Итого: ${total} ₽`;
        
        document.querySelectorAll(".qty-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const delta = parseInt(btn.dataset.delta);
                updateQuantity(id, delta);
            });
        });
    }

    function renderAllOrders() {
        const container = document.getElementById("allOrdersList");
        let orders = getAllOrders();
        
        // Фильтрация
        if (currentFilter === 'pending') {
            orders = orders.filter(o => o.status === 'pending');
        } else if (currentFilter === 'completed') {
            orders = orders.filter(o => o.status === 'completed');
        }
        
        if (orders.length === 0) {
            container.innerHTML = `<div class="empty-orders">📭 Нет заказов для отображения</div>`;
            document.getElementById("statsBadge").innerHTML = `📊 Заказов: 0`;
            return;
        }
        
        const pendingCount = getAllOrders().filter(o => o.status === 'pending').length;
        document.getElementById("statsBadge").innerHTML = `📊 Заказов: ${getAllOrders().length} (ожидают: ${pendingCount})`;
        
        container.innerHTML = orders.map(order => {
            const isCompleted = order.status === "completed";
            const itemsText = order.items.map(i => `${i.name} x${i.quantity}`).join(", ");
            
            return `
                <div class="order-card ${isCompleted ? 'completed' : ''}">
                    <div class="order-header">
                        <div class="order-customer">
                            <span class="order-customer-emoji">👤</span>
                            ${order.customerName}
                            <span style="font-size:0.7rem; color:#8b7355;">${order.orderId}</span>
                        </div>
                        <div>
                            <span class="order-date">📅 ${order.date}</span>
                            <span class="order-status ${isCompleted ? 'status-completed' : 'status-pending'}">
                                ${isCompleted ? '✅ Выполнен' : '⏳ Ожидает выполнения'}
                            </span>
                        </div>
                    </div>
                    <div class="order-items">
                        ${itemsText}
                    </div>
                    <div class="order-footer">
                        <span class="order-total">💰 ${order.total} ₽</span>
                        ${!isCompleted ? `
                            <button class="complete-order-btn" data-id="${order.id}">✅ Отметить выполненным</button>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join("");
        
        // Добавляем обработчики для кнопок выполнения
        document.querySelectorAll(".complete-order-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const orderId = parseInt(btn.dataset.id);
                if (markOrderCompleted(orderId)) {
                    renderAllOrders();
                    showNotification(`✅ Заказ отмечен как выполненный!`, "success");
                }
            });
        });
    }

    // ===================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ =====================
    function switchToGuest(userName) {
        currentRole = 'guest';
        initGuest(userName);
        
        // Показываем/скрываем элементы
        document.getElementById("cartSection").style.display = "block";
        document.getElementById("ordersPanel").style.display = "none";
        document.getElementById("displayUserRole").innerHTML = "🍕 Посетитель";
        
        renderGuestCart();
        renderAll();
    }
    
    function switchToHostess(userName) {
        currentRole = 'hostess';
        currentUser = { name: userName, role: 'hostess' };
        
        // Показываем/скрываем элементы
        document.getElementById("cartSection").style.display = "none";
        document.getElementById("ordersPanel").style.display = "block";
        document.getElementById("displayUserRole").innerHTML = "👩‍🍳 Хозяйка кафе";
        
        renderAll();
        renderAllOrders();
        
        // Обновляем статистику
        const pendingCount = getAllOrders().filter(o => o.status === 'pending').length;
        document.getElementById("statsBadge").innerHTML = `📊 Всего заказов: ${getAllOrders().length} | Ожидают: ${pendingCount}`;
    }

    function renderAll() {
        if (!currentUser) return;
        document.getElementById("displayUserName").innerText = currentUser.name;
        renderCategories();
        renderMenu();
    }

    function showNotification(msg, type = "info") {
        const notif = document.createElement("div");
        notif.className = "notification";
        notif.style.background = type === "error" ? "#e74c3c" : "#2ecc71";
        notif.textContent = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2500);
    }

    // ===================== ИНИЦИАЛИЗАЦИЯ ВХОДА =====================
    let selectedRole = 'guest';
    
    document.querySelectorAll(".role-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            selectedRole = btn.dataset.role;
        });
    });
    
    document.getElementById("loginBtn").addEventListener("click", () => {
        const name = document.getElementById("userNameInput").value.trim();
        if (!name) {
            document.getElementById("loginError").style.display = "block";
            return;
        }
        document.getElementById("loginError").style.display = "none";
        
        if (selectedRole === 'guest') {
            switchToGuest(name);
        } else {
            switchToHostess(name);
        }
        
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainInterface").style.display = "block";
    });
    
    document.getElementById("changeUserBtn").addEventListener("click", () => {
        if (currentRole === 'guest') saveGuestData();
        currentUser = null;
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("mainInterface").style.display = "none";
        document.getElementById("userNameInput").value = "";
        document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
        document.querySelector(".role-btn[data-role='guest']").classList.add("active");
        selectedRole = 'guest';
    });
    
    document.getElementById("placeOrderBtn")?.addEventListener("click", placeGuestOrder);
    document.getElementById("clearCartBtn")?.addEventListener("click", clearGuestCart);
    
    // Фильтры для Хозяйки
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            if (currentRole === 'hostess') {
                renderAllOrders();
            }
        });
    });
    
    document.getElementById("userNameInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    });
    
    // Устанавливаем роль по умолчанию
    document.querySelector(".role-btn[data-role='guest']").classList.add("active");
</script>
</body>
</html>
